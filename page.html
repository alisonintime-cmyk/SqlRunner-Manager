<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Gerenciador de Comandos SQL</title>
  <link rel="stylesheet" href="popup.css">
  <!-- Prism.js para syntax highlight -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css"/>
</head>
<body class="dark">
  <div class="wrap">
    <h1>Gerenciador de Comandos SQL</h1>
    <div class="sub">Tema + syntax highlight + backup</div>

    <!-- Top row: tema + filtro + botões -->
    <div class="top-row">
      <div class="row-top">
        <select id="theme">
          <option value="dark">Escuro</option>
          <option value="light">Claro</option>
        </select>
        <input id="filter" placeholder="Filtrar...">
      </div>
      <div class="btns" id="btnGroup">
        <button class="primary" id="btnNovo">+ Novo</button>
        <button class="ghost" id="btnBackup">Gerar backup</button>
        <input type="file" id="file" hidden accept=".json">
        <button class="ghost" id="btnImport">Importar backup</button>
      </div>
    </div>

    <div class="card" id="list"></div>
  </div>

  <!-- Modal -->
  <div class="modal" id="modal" style="display:none">
    <div class="modal-card">
	  <h3>Novo Comando</h3>
	  <div class="form-group">
	    <label>Título</label>
	    <input id="mTitle">
	  </div>
	  <div class="form-group">
	    <label>SQL / Comando</label>
	    <textarea id="mSql"></textarea>
	    <pre id="preview" class="sql language-sql"></pre>
	  </div>
	  <div class="foot right">
	    <button class="cancel" id="btnCancelar">Cancelar</button>
	    <button class="save" id="btnSalvar">Salvar</button>
	  </div>
	</div>
  </div>

  <link rel="stylesheet" href="libs/prism/prism-tomorrow.css">
  <script src="libs/prism/prism-sql.js"></script>
  <script src="page.js"></script>
</body>
</html>
